$kind: http-request
url: "{{baseUrl}}/v1/users/:id"
method: GET
headers:
  Accept: application/json
pathVariables:
  - key: id
    value: "{{userId}}"
    $type: |-
      {
        "type": "object",
        "properties": {
          "value": {
            "type": "integer"
          }
        },
        "required": [
          "value"
        ]
      }
body:
  type: text
  content: ""
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      // Verify the endpoint returns 200 OK
      pm.test('Status code is 200', function () {
          pm.response.to.have.status(200);
      });
examples: ./.resources/Retrieve a user.resources/examples
order: 1000