$kind: http-request
name: Log in a user
url: "{{baseUrl}}/v1/users/login"
method: POST
headers:
  Content-Type: application/json
  Accept: application/json
body:
  type: json
  content: |-
    {
      "username": "{{username}}",
      "password": "{{password}}"
    }
  $type: |-
    {
      "type": "object",
      "properties": {
        "username": {
          "type": "string"
        },
        "password": {
          "type": "string"
        }
      }
    }
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      // Verify the endpoint returns 200 OK
      pm.test('Status code is 200', function () {
          pm.response.to.have.status(200);
      });
examples: ./.resources/Log in a user.resources/examples
order: 1000